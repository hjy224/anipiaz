<!DOCTYPE html>
<html lang="ko">

<head>
   <meta charset="utf-8">
   <meta http-equiv="Content-Language" content="ko">
   <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
   <meta http-equiv="Cache-Control" content="no-cache">
   <meta http-equiv="Pragma" content="no-cache">
   <meta http-equiv="Expires" content="0">
   <meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
   <style>
      .queBox {
         background: #1e3b90;
      }

      .que {
		  
         display: block;
         width: 95px;
         padding: 10px 20px 20px 0;
         cursor: pointer;
         font-size: 16px;
         background: url(210927-btn1.png) no-repeat right top 13px / 18px 18px;
         text-align: center;
         color: #fff;
      }

      .que.on {
         background: url(210927-btn2.png) no-repeat right top 17px / 16px 16px;
      }

      .anw {
         display: none;
         overflow: hidden;
      }
   </style>
   <script type="text/javascript" src="./resource/js/jquery-3.4.1.min.js"></script>
</head>

<body>

   <!-- wrapper -->
   <div class="queBox">
      <div class="que">
         <span>자세히보기</span>
      </div>

      <div class="anw">
         ddddddddddddd<br>
		 ddddddddddddd<br>
		 ddddddddddddd<br>
		 ddddddddddddd<br>
		 ddddddddddddd<br>
		 ddddddddddddd<br>
		 ddddddddddddd<br>
		 ddddddddddddd<br>
		 
      </div>
   </div>
   <script>
      $(".que").click(function () {
         $(this).next(".anw").stop().slideToggle(300);
         $(this).toggleClass('on').siblings().removeClass('on');
         $(this).next(".anw").siblings(".anw").slideUp(300); // 1개씩 펼치기
      });
   </script>
</body>

</html>
