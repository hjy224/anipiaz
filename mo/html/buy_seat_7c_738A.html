<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="height=device-height, width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0">
    <title>좌석 지정 - 부가서비스 구매하기</title>
    <link rel="stylesheet" href="../resource/css/ags_mo_all.css">
    <script src="../resource/js/jquery-3.4.1.min.js"></script>
    <script src="../resource/js/ags_mo.ui.js"></script>
</head>

<body>
    <div id="ags-wrap" class="ags-wrap">
        <div class="ags-container">
            <section class="ags-contents" data-page-id="buy__seat">

                <div class="tab-wrap">
                    <div class="tabtab">
                        <a href="#none" class="">탭탭탭</a>
                    </div>              

                    <!-- 탭버튼 -->
                    <div class="tabs tabs_route">
                        <ul role="tablist">
                            <li role="tab" aria-controls="tab-panel1" class="active">가는 편</li>
                            <li role="tab" aria-controls="tab-panel2">오는 편</li>
                        </ul>
                    </div>
                    <!-- //탭버튼 -->

                    <div class="tab-panels">
                        <div class="align-horizontal">
                            <!-- 가는 편 탭 컨텐츠 -->
                            <div id="tab-panel1" class="tab-panel active" role="tabpanel">
                                가는 편
                            </div>
                            <!-- //가는 편 탭 컨텐츠 -->

                            <!-- 오는 편 탭 컨텐츠 -->
                            <div id="tab-panel2" class="tab-panel" role="tabpanel">
                                오는 편
                            </div>
                            <!-- //오는 편 탭 컨텐츠 -->

                        </div>
                    </div>

                </div>
            </section>
        </div>
    </div>
</body>

</html>
